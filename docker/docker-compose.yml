name: generic-auth

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      RUST_LOG: info,generic_auth=debug,sqlx=warn
      DATABASE_URL: postgres://auth_user:auth_password@postgres:5432/auth_db
      APP__AUTH__JWT_SECRET: ${APP__AUTH__JWT_SECRET:-change-me-in-production}
      APP__DB__RUN_MIGRATIONS_ON_START: "true"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
