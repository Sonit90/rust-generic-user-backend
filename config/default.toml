# Base configuration for generic auth service.
# Values can be overridden by env vars of the form APP__SECTION__KEY
# (double underscores delimit nesting). Example: APP__HTTP__BIND.

[http]
bind = "0.0.0.0:8080"
public_url = "http://localhost:8080"
request_timeout_secs = 30

[db]
# Prefer DATABASE_URL env var; this is a fallback for local runs.
url = "postgres://auth_user:auth_password@localhost:5432/auth_db"
max_connections = 20
min_connections = 2
acquire_timeout_secs = 10
run_migrations_on_start = true

[auth]
jwt_secret = "change-me-in-production"
jwt_access_ttl_min = 30
jwt_refresh_ttl_days = 14
password_min_length = 8

[auth.google]
client_id = ""
client_secret = ""
redirect_url = "http://localhost:8080/api/v1/auth/oauth/google/callback"

[cors]
# Empty list = no CORS headers added. Use ["*"] only in dev.
allowed_origins = []

[email]
# SMTP_HOST blank → dev mode, verification link logged to stdout instead of sent.
# Works with any SMTP provider: set smtp_host, smtp_port, smtp_username, smtp_password.
#   Mailjet:  smtp_host = "in-v3.mailjet.com",  smtp_port = 587
#   SendGrid: smtp_host = "smtp.sendgrid.net",  smtp_port = 587
#   Mailgun:  smtp_host = "smtp.mailgun.org",   smtp_port = 587
smtp_host = ""
smtp_port = 587
smtp_username = ""
smtp_password = ""
from_email = "noreply@example.com"
from_name = "Auth Service"
