# Production overrides. Real secrets come from env vars (APP__*).

[http]
request_timeout_secs = 60

[db]
max_connections = 50
min_connections = 5
run_migrations_on_start = false  # run via `sqlx migrate run` in deploy step

[files]
ttl_hours = 168 # 1 week

[jobs]
workers = 8

[cors]
allowed_origins = []
